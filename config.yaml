# editAnything pipeline config.
#   Run:  cd editAnything && python src/pipeline.py --config config.yaml
# Any CLI flag overrides the value here. Comment a line out to fall back to the
# built-in default. Paths may be absolute or relative to where you run the command.

# ---------- input ----------  (see input/README.txt)
# video: input/cup2.mp4                  # full 300f (7 chunks)
frames_dir: input/frames_2chunk           # 97 frames -> 2 chunks (this run)

# ---------- what to replace ----------
source: cup                               # OLD object to remove (SAM3 noun)
target: a ripe yellow banana              # NEW object (short description)
target_word: banana                       # NEW object noun for SAM3 on ref0 (blank -> uses `target`)
prompt: "a ripe yellow banana resting on a glossy dark round table, a hand with a ring on the table, smooth reflective tabletop, soft natural light, pale blue-grey wall"

name: cup2_2chunk          # outputs -> /root/project/outputs/cup2_2chunk/

# ---------- anchors + edit region ----------
backend: roma                             # roma (general) | assets (use prepared anchors+masks)
ref0: input/replacement.png               # (roma) frame-0 reference: new object on frame 0
# ref0_mask:                              # (roma) optional precomputed frame-0 target mask (else SAM3)
# assets:                                 # (assets) dir containing anchors/ and banana_masks/
# mask_mode: union                        # (assets only) union | source | target

# ---------- generation ----------
# segment_starts: [0, 48]                 # blank -> auto from frame count (every 48 + tail)
dilate: 12                                # edit-region bbox padding (px)
steps: 50
guidance: 6.0
seed: 42

# ---------- output ----------
out_size: 480x832                         # WxH; blank -> native frame size
fps: 25
interpolate: true                         # RIFE anchor de-spike (smooth segment boundaries)
no_composite: false                       # roma backend skips composite automatically regardless

# ---------- models (blank -> repo defaults under VideoPainter/ckpt) ----------
